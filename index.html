<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ela Thermomix | Autoryzowany Doradca</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #76b82a; --dark: #0d0d12; --light: #ffffff; --gray: #f8f9fa; }
        * { margin:0; padding:0; box-sizing:border-box; scroll-behavior: smooth; user-select: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--light); color: #333; line-height: 1.6; transition: 0.3s; }

        /* TRYBY DOSTĘPNOŚCI */
        body.epilepsy { filter: saturate(0.4) contrast(0.9); }
        body.epilepsy .track { animation: none !important; overflow-x: auto; }
        body.low-vision { font-size: 1.35rem; filter: contrast(1.6); }
        body.cognitive { background: #d1d9e0 !important; letter-spacing: 1px; }
        body.cognitive .scroll-container { opacity: 0.5; filter: sepia(1); }
        body.adhd { border: 15px solid var(--primary); }
        body.adhd .track { animation-duration: 150s !important; }
        body.blind { filter: invert(1); background: #000; }

        /* NAWIGACJA */
        .navbar { position: sticky; top: 0; background: rgba(255,255,255,0.95); display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; z-index: 1000; border-bottom: 1px solid #eee; backdrop-filter: blur(10px); }
        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links a { text-decoration: none; color: #333; font-weight: 700; font-size: 0.9rem; }

        /* MENU */
        .menu-btn { background: var(--primary); color: white; border: none; padding: 10px 22px; border-radius: 12px; cursor: pointer; font-weight: 800; }
        .dropdown { 
            position: absolute; top: 75px; right: 5%; background: white; width: 340px; 
            padding: 25px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            display: none; border: 1px solid #eee; z-index: 2000;
        }
        .dropdown.active { display: block; animation: fadeIn 0.3s ease; }
        
        .acc-option { margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .acc-btn { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; font-weight: 700; cursor: pointer; text-align: left; margin-top: 5px; }
        .acc-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* HERO & SEKCJE */
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; }
        .hero span { color: var(--primary); }
        .btn-main { margin-top: 25px; padding: 18px 45px; background: var(--primary); color: white; border-radius: 50px; text-decoration: none; font-weight: 800; }

        .about { padding: 80px 5%; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px; align-items: center; }
        .about img { width: 100%; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }

        .scroll-container { padding: 50px 0; background: var(--gray); overflow: hidden; }
        .dark-bg { background: var(--dark); color: white; }
        .track { display: flex; gap: 20px; animation: scroll 40s linear infinite; width: max-content; }
        .card { width: 320px; border-radius: 20px; overflow: hidden; flex-shrink: 0; }
        .rev-card { background: #1a1a24; padding: 30px; border: 1px solid #222; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        
        #copyModal { position: fixed; top: 20px; right: 20px; background: white; border-left: 5px solid var(--primary); padding: 15px 25px; border-radius: 12px; display: none; z-index: 99999; box-shadow: 0 10px 30px rgba(0,0,0,0.2); font-weight: 700; }
    </style>
</head>
<body id="b" oncontextmenu="return showBlocked(event)">

            <div class="acc-option"><h5 data-key="acc-adhd-h">Tryb ADHD</h5><button class="acc-btn" onclick="toggleAcc('adhd', this)">OFF/ON</button></div>
            
            <h4 data-key="head-lang" style="font-size: 11px; color: #999; margin: 15px 0 5px;">JĘZYK</h4>
            <select onchange="changeLang(this.value)" id="langSelect" style="width:100%; padding:10px; border-radius:8px; font-weight:700;"></select>
        </div>
    </nav>

    <section class="hero">
        <h1 data-key="hero-title">Gotuj z <span>Pasją</span></h1>
        <p data-key="hero-sub">Nowoczesna kuchnia z Ela Thermomix.</p>
        <a href="#booking" class="btn-main" data-key="hero-btn">Darmowy pokaz</a>
    </section>

    <section class="about" id="o-mnie">

        function toggleMenu() { document.getElementById('m').classList.toggle('active'); }
        function toggleAcc(cls, btn) { document.body.classList.toggle(cls); btn.classList.toggle('active'); }

        function renderReviews(lang) {
            const rt = document.getElementById('reviewTrack'); rt.innerHTML = '';
            const data = langData[lang] || langData['pl'];
            [...data.revs, ...data.revs, ...data.revs].forEach(o => {
                const c = document.createElement('div');
                c.className = 'card rev-card';
                c.innerHTML = `<strong>${o.n}</strong><p style="color:#aaa;margin-top:10px;">"${o.t}"</p>`;
                rt.appendChild(c);
            });
        }

        function changeLang(lang) {
            const data = langData[lang] || langData['pl'];
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (data[key]) el.textContent = data[key];
            });
            document.getElementById('modalText').textContent = data['modal'];
            updateLangList(lang);
            renderReviews(lang);
        }

        function updateLangList(currentLang) {
            const select = document.getElementById('langSelect');
            const names = langData[currentLang].langs;
            select.innerHTML = '';
            Object.keys(names).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key; opt.textContent = names[key];
                opt.selected = (key === currentLang);
                select.appendChild(opt);
            });
        }

        function showBlocked(e) {
            e.preventDefault();
            const m = document.getElementById('copyModal');
            m.style.display = 'block'; setTimeout(() => m.style.display = 'none', 2500);
            return false;
        }

        // INIT
        updateLangList('pl'); renderReviews('pl');

</html>
