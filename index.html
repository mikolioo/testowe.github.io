    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #76b82a; --dark: #0d0d12; --light: #ffffff; --gray: #f8f9fa; }
        * { margin:0; padding:0; box-sizing:border-box; scroll-behavior: smooth; user-select: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--light); color: #333; line-height: 1.6; transition: 0.3s; }

        /* TRYBY DOSTĘPNOŚCI */
        body.epilepsy { filter: saturate(0.3) contrast(0.9); }
        body.epilepsy .track { animation: none !important; overflow-x: auto; }
        body.low-vision { font-size: 1.4rem; filter: contrast(1.7); }
        body.cognitive { background: #d1d9e0 !important; letter-spacing: 1.2px; }
        body.adhd { border: 20px solid var(--primary); }
        body.adhd .track { animation-duration: 180s !important; }
        body.blind { filter: invert(1); background: #000; }

        /* NAWIGACJA */
        .navbar { position: sticky; top: 0; background: rgba(255,255,255,0.95); display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; z-index: 1000; border-bottom: 1px solid #eee; backdrop-filter: blur(10px); }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { text-decoration: none; color: #333; font-weight: 700; font-size: 0.85rem; }

        /* MENU */
        .menu-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 800; }
        .dropdown { 
            position: absolute; top: 75px; right: 5%; background: white; width: 340px; 
            padding: 25px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            display: none; border: 1px solid #eee; z-index: 2000;
        }
        .dropdown.active { display: block; animation: fadeIn 0.3s ease; }
        
        .acc-option { margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        .acc-btn { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; font-weight: 700; cursor: pointer; text-align: left; margin-top: 5px; }
        .acc-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* HERO */
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: clamp(2rem, 7vw, 4rem); font-weight: 800; }
        .hero span { color: var(--primary); }
        .btn-main { margin-top: 20px; padding: 15px 40px; background: var(--primary); color: white; border-radius: 50px; text-decoration: none; font-weight: 800; }

        /* SEKCJE */
        .section-title { text-align: center; font-size: 2rem; margin-bottom: 30px; font-weight: 800; }
        .about { padding: 60px 5%; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; align-items: center; }
        .about img { width: 100%; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* GALERIA & TRACKS */
        .scroll-container { padding: 40px 0; background: var(--gray); overflow: hidden; }
        .dark-bg { background: var(--dark); color: white; }
        .track { display: flex; gap: 20px; animation: scroll 40s linear infinite; width: max-content; }
        
        /* KARTY OBRAZÓW */
        .img-card { width: 300px; height: 300px; border-radius: 20px; overflow: hidden; border: 6px solid white; flex-shrink: 0; transition: 0.3s; }
        .img-card:hover { transform: scale(1.05); border-color: var(--primary); }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }

        /* KARTY OPINII */
        .rev-card { width: 300px; background: #1a1a24; border: 1px solid #222; border-radius: 20px; padding: 25px; flex-shrink: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        
        #copyModal { position: fixed; top: 20px; right: 20px; background: white; border-left: 5px solid var(--primary); padding: 15px 25px; border-radius: 12px; display: none; z-index: 99999; box-shadow: 0 10px 30px rgba(0,0,0,0.2); font-weight: 700; }
    </style>
</head>

        function toggleMenu() { document.getElementById('m').classList.toggle('active'); }
        function toggleAcc(cls, btn) { document.body.classList.toggle(cls); btn.classList.toggle('active'); }

        function renderReviews(lang) {
            const rt = document.getElementById('reviewTrack'); rt.innerHTML = '';
            const data = langData[lang] || langData['pl'];
            [...data.revs, ...data.revs, ...data.revs, ...data.revs].forEach(o => {
                const c = document.createElement('div');
                c.className = 'rev-card';
                c.innerHTML = `<strong>${o.n}</strong><p style="color:#aaa;margin-top:10px;">"${o.t}"</p>`;
                rt.appendChild(c);
            });
        }

        function changeLang(lang) {
            const data = langData[lang] || langData['pl'];
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (data[key]) el.textContent = data[key];
            });
            document.getElementById('modalText').textContent = data['modal'];
            updateLangList(lang);
            renderReviews(lang);
        }

        function updateLangList(currentLang) {
            const select = document.getElementById('langSelect');
            const names = langData[currentLang].langs;
            select.innerHTML = '';
            Object.keys(names).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key; opt.textContent = names[key];
                opt.selected = (key === currentLang);
                select.appendChild(opt);
            });
        }

        function showBlocked(e) {
            e.preventDefault();
            const m = document.getElementById('copyModal');
            m.style.display = 'block'; setTimeout(() => m.style.display = 'none', 2000);
            return false;
        }

        updateLangList('pl'); renderReviews('pl');
    </script>
</body>
