<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ela Thermomix | Nowoczesny Doradca</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="accessibility-panel">
        <button class="menu-trigger" id="menuBtn">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
        <div class="dropdown-content" id="menuContent">
            <div class="acc-section">
                <h4>Widok</h4>
                <button onclick="setAccessibility('contrast')">Wysoki Kontrast</button>
                <button onclick="setAccessibility('font')">Powiększ tekst</button>
            </div>
            <div class="acc-section">
                <h4>Szybki Kontakt</h4>
                <a href="https://wa.me/48123456789" class="wa-link"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                <a href="mailto:ela@thermomix.pl"><i class="fas fa-envelope"></i> Napisz e-mail</a>
            </div>
        </div>
    </div>

    <nav class="glass-nav">
        <div class="logo">Ela<span>.</span></div>
    </nav>

    <section id="hero" class="hero">
        <div class="hero-bg-shapes">
            <div class="shape s1"></div>
            <div class="shape s2"></div>
        </div>
        <div class="hero-content" data-aos="fade-right">
            <h1 class="reveal-text">Pokazy i sprzedaż <span>Thermomix</span></h1>
            <p data-aos="fade-up" data-aos-delay="300">Gotowanie przyszłości w Twoim zasięgu.</p>
            <div class="hero-btns" data-aos="fade-up" data-aos-delay="500">
                <a href="#booking" class="btn-main">Zarezerwuj pokaz</a>
            </div>
        </div>
    </section>

    <section class="reviews-section">
        <h2 class="section-title" data-aos="fade-down">Głosy Klientów</h2>
        <div class="marquee-container">
            <div id="testimonial-track" class="marquee-track">
                </div>
        </div>
    </section>

    <section id="booking" class="booking-section">
        <div class="container grid-2">
            <div class="card-glass booking-card" data-aos="flip-left">
                <h2>Zapisz się</h2>
                <form id="contact-form" action="https://formspree.io/f/yourID" method="POST">
                    <div class="input-group">
                        <input type="text" name="name" placeholder="Imię" required>
                    </div>
                    <div class="input-group">
                        <input type="email" name="email" placeholder="E-mail" required>
                    </div>
                    <select name="type">
                        <option value="stacjonarnie">Pokaz stacjonarny</option>
                        <option value="online">Pokaz online</option>
                    </select>
                    <button type="submit" class="btn-submit">Wyślij zgłoszenie</button>
                </form>
            </div>

            <div class="contact-details" data-aos="fade-left">
                <h3>Bądźmy w kontakcie</h3>
                <div class="contact-box">
                    <div class="contact-item"><i class="fas fa-phone"></i> +48 123 456 789</div>
                    <div class="contact-item"><i class="fas fa-envelope"></i> kontakt@ela-tm.pl</div>
                    <div class="contact-item"><i class="fab fa-instagram"></i> @ela_doradca</div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
